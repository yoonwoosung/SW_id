{% extends "layout.html" %}
{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card mt-5">
                <div class="card-header">
                    <h1 class="text-center">회원가입</h1>
                </div>
                <div class="card-body">
                    {# --- ▼▼▼▼▼ form 태그 수정 ▼▼▼▼▼ --- #}
                    <form id="register-form" method="POST" action="{{ url_for('register_page') }}">
                        <div class="form-group">
                            <label for="nickname">닉네임</label>
                            <input type="text" id="nickname" name="nickname" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="email">이메일</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="password">비밀번호</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>가입 유형</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="role-user" value="experiencer" checked>
                                <label class="form-check-label" for="role-user">체험자</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="role" id="role-farmer" value="farmer">
                                <label class="form-check-label" for="role-farmer">농장주</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success btn-block mt-4">가입하기</button>
                    </form>
                    {# --- ▲▲▲▲▲ 여기까지 수정 ▲▲▲▲▲ --- #}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
