<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>FarmLink</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header-{{ session.get('role', 'experiencer') }}">
        <div class="header-content container">
                        <a href="/set_role/experiencer" class="logo-text">FarmLink</a>
            <div class="nav-items">
                <a href="#" class="btn-login">로그인/회원가입</a>
                <div class="role-selector">
                    <div class="dropdown">
                        <button class="dropbtn">
                            {% if session.get('role') == 'farmer' %}
                                농부 🧑‍🌾
                            {% elif session.get('role') == 'volunteer' %}
                                봉사자 🙋
                            {% else %}
                                체험자 👪
                            {% endif %}
                        </button>
                        <div class="dropdown-content">
                            <a href="/set_role/experiencer">체험자</a>
                            <a href="/set_role/farmer">농부</a>
                            <a href="/set_role/volunteer">봉사자</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="initial-popup" class="popup-overlay" {% if session.get('role') %}style="display: none;"{% endif %}>
            <div class="popup-content">
                <h2>어떤 목적으로 오셨나요?</h2>
                <a href="/set_role/farmer" class="popup-button farmer">농부로 시작하기</a>
                <a href="/set_role/experiencer" class="popup-button experiencer">체험자로 시작하기</a>
            </div>
        </div>

        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>dy>
</html>
