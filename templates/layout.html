<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>FarmLink</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header-{{ session.get('role', 'experiencer') }}">
        <div class="header-content container">
            <a href="/" class="logo-text">FarmLink</a>
            <div class="nav-items">
                
                {% if 'user_id' in session %}
                    {% if session.get('role') == 'farmer' %}
                    <a href="{{ url_for('my_farm') }}" class="text-white mr-3">내 농장</a>
                    {% endif %}
                    <span class="text-white mr-3">{{ session['nickname'] }}님</span>
                    <a href="{{ url_for('logout') }}" class="btn-login">로그아웃</a>
                {% else %}
                     <a href="{{ url_for('login_page') }}" class="btn-login">로그인/회원가입</a>
                {% endif %}
                <div class="role-selector">
                    <div class="dropdown">
                        <button class="dropbtn">
                            {% if session.get('role') == 'farmer' %}
                                농부 🧑‍🌾
                            {% elif session.get('role') == 'volunteer' %}
                                봉사자 🙋
                            {% else %}
                                체험자 👪
                            {% endif %}
                        </button>
                        <div class="dropdown-content">
                            <a href="/set_role/experiencer">체험자</a>
                            <a href="/set_role/farmer">농부</a>
                            <a href="/set_role/volunteer">봉사자</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    {% block scripts %}{% endblock %}
    
</body>
</html>
